<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Éditeur Linguistique — Tribus du Maroc</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080604;--panel:#0f0c08;--panel2:#141008;
  --border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.32);
  --gold:#c9a84c;--gold2:#e8c870;--text:#e0d4c0;--muted:#6a5a48;
}
body{font-family:"EB Garamond",serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* HEADER */
header{display:flex;align-items:center;gap:10px;padding:5px 12px;background:rgba(8,5,2,.98);border-bottom:1px solid var(--border2);flex-shrink:0;flex-wrap:wrap}
.logo-main{font-family:"Cinzel",serif;font-size:.85rem;font-weight:700;letter-spacing:.14em;color:var(--gold2)}
.logo-sub{font-size:.7rem;color:var(--muted);letter-spacing:.07em;font-style:italic;margin-left:6px}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:3px 11px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:"Cinzel",serif;font-size:.66rem;letter-spacing:.07em;border-radius:2px;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold)}
#export-btn{border-color:rgba(90,200,90,.25);color:#5acc5a}
#export-btn:hover{border-color:#5acc5a;background:rgba(90,200,90,.08)}
#file-input{display:none}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#tribe-count{font-size:.7rem;color:var(--muted);font-style:italic}

/* VIEW TABS */
.view-tabs{display:flex;gap:2px;margin-left:4px}
.vtab{padding:3px 10px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:"EB Garamond",serif;font-size:.73rem;color:var(--muted);border-radius:2px;transition:all .15s;white-space:nowrap}
.vtab.active{background:rgba(201,168,76,.15);border-color:var(--border2);color:var(--text)}

/* UNDO */
.undo-btn{padding:3px 9px;border:1px solid rgba(150,120,80,.25);background:rgba(80,60,40,.15);color:#9a8060;cursor:pointer;font-family:"EB Garamond",serif;font-size:.72rem;border-radius:2px}
.undo-btn:hover{background:rgba(80,60,40,.35)}

/* LAYOUT */
#wrap{flex:1;display:flex;overflow:hidden}
#sidebar{width:210px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;cursor:crosshair}

/* PALETTE */
#palette-scroll{flex:1;overflow-y:auto;padding:0}
.pal-section{padding:8px 10px 4px}
.pal-title{font-family:"Cinzel",serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.pal-title::after{content:"";flex:1;height:1px;background:var(--border)}
.swatch{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:3px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .1s}
.swatch:hover{background:rgba(255,255,255,.05)}
.swatch.active{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.08)}
.swatch.active .sw-dot{transform:scale(1.25);box-shadow:0 0 0 2px rgba(255,255,255,.5)}
.sw-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0;transition:transform .1s}
.sw-label{font-size:.76rem;color:var(--text);line-height:1.3}
.swatch.active .sw-label{color:#fff}
.swatch.erase{border:1px dashed rgba(200,80,80,.35)}
.swatch.erase.active{border-color:rgba(200,80,80,.7);background:rgba(200,80,80,.08)}
.pal-divider{height:1px;background:var(--border);margin:4px 10px}

/* BRUSH INDICATOR */
#brush-bar{padding:6px 10px;border-top:1px solid var(--border);background:rgba(0,0,0,.25);flex-shrink:0}
.bi-label{font-family:"Cinzel",serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.bi-current{display:flex;align-items:center;gap:7px}
.bi-dot{width:13px;height:13px;border-radius:2px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.bi-name{font-size:.78rem;color:var(--text)}

/* PROGRESS */
#progress-bar{padding:5px 10px;border-top:1px solid var(--border);flex-shrink:0}
.prog-text{font-size:.65rem;color:var(--muted);margin-bottom:2px}
.prog-track{height:3px;background:rgba(201,168,76,.08);border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* TOOLTIP */
#tip{position:fixed;background:rgba(6,4,2,.96);border:1px solid var(--border2);padding:4px 10px;font-size:.75rem;pointer-events:none;z-index:9999;display:none;color:var(--text);border-radius:2px;max-width:210px;line-height:1.45;box-shadow:0 4px 16px rgba(0,0,0,.6)}
#tip b{color:var(--gold2);display:block;font-family:"Cinzel",serif;font-size:.7rem;margin-bottom:1px}
.tip-lang{font-weight:600}

/* EMPTY STATE */
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(8,6,4,.88);z-index:500;transition:opacity .4s}
#empty-state.gone{opacity:0;pointer-events:none}
.es-drop{border:2px dashed rgba(201,168,76,.28);border-radius:4px;padding:22px 40px;text-align:center;cursor:pointer}
.es-drop:hover{border-color:var(--gold);background:rgba(201,168,76,.04)}
.es-icon{font-size:2.4rem;opacity:.4;display:block;margin-bottom:8px}
.es-title{font-family:"Cinzel",serif;font-size:1rem;color:var(--gold);letter-spacing:.1em;display:block;margin-bottom:4px}
.es-hint{font-size:.78rem;color:var(--muted);line-height:1.6}

/* SEARCH */
#search-wrap{padding:6px 10px 0;flex-shrink:0}
#searchbox{width:100%;padding:3px 7px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font-family:"EB Garamond",serif;font-size:.75rem;border-radius:2px;outline:none}
#searchbox::placeholder{color:var(--muted)}
#searchbox:focus{border-color:rgba(201,168,76,.4)}

.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#444!important;font-size:9px!important}
#palette-scroll::-webkit-scrollbar{width:3px}
#palette-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:2px}
body.dragging-over::after{content:"Déposer ici";position:fixed;inset:0;background:rgba(201,168,76,.07);border:3px dashed var(--gold);display:flex;align-items:center;justify-content:center;font-family:"Cinzel",serif;font-size:1.3rem;color:var(--gold);z-index:9998;pointer-events:none}
</style>
</head>
<body>
<header>
  <span class="logo-main">Tribus du Maroc</span>
  <span class="logo-sub">Éditeur linguistique</span>
  <div class="sep"></div>
  <button class="hdr-btn" id="import-btn">▸ Importer GeoJSON</button>
  <input type="file" id="file-input" accept=".geojson,.json">
  <div class="view-tabs" id="view-tabs">
    <button class="vtab active" data-view="language">Langue</button>
    <button class="vtab" data-view="origin">Origine</button>
    <button class="vtab" data-view="ethnicity">Ethnie</button>
    <button class="vtab" data-view="lifestyle">Vie</button>
  </div>
  <div class="sep"></div>
  <button class="undo-btn" id="undo-btn" title="Ctrl+Z">↩ Undo</button>
  <div class="hdr-right">
    <span id="tribe-count"></span>
    <button class="hdr-btn" id="export-btn">⬇ Exporter</button>
  </div>
</header>

<div id="wrap">
  <div id="sidebar">
    <div id="search-wrap">
      <input type="text" id="searchbox" placeholder="Chercher tribu...">
    </div>
    <div id="palette-scroll"></div>
    <div id="brush-bar">
      <div class="bi-label">Pinceau actif</div>
      <div class="bi-current">
        <div class="bi-dot" id="bi-dot"></div>
        <span class="bi-name" id="bi-name">Aucun sélectionné</span>
      </div>
    </div>
    <div id="progress-bar">
      <div class="prog-text" id="prog-text">0 / 0 assignés</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="map">
    <div id="empty-state">
      <div class="es-drop" id="drop-zone">
        <span class="es-icon">🗺</span>
        <span class="es-title">Éditeur Linguistique</span>
        <span class="es-hint">Glisser-déposer un GeoJSON<br>ou cliquer pour parcourir</span>
      </div>
    </div>
  </div>
</div>
<div id="tip"></div>

<script>
// ── PALETTES ────────────────────────────────────────────────
var PALETTES = {
  language: {
    title: "Language",
    groups: [
      { title: "Tamazight", items: [
          {id:"tachelhit",   label:"Tachelhit",                  color:"#e8b800"},
          {id:"tamazight",   label:"Tamazight (Central Atlas)",   color:"#f5d200"},
          {id:"tarifit",     label:"Tarifit",                    color:"#e09020"},
          {id:"tasenhajit",  label:"Tasenhajit (Sanhaja Srair)", color:"#c8d040"},
          {id:"taghomarit",  label:"Taghomarit (Ghomara)",       color:"#a8d040"}
      ]},
      { title: "Darija", items: [
          {id:"darija",       label:"Darija",         color:"#3060c0"},
          {id:"darija_jbala", label:"Darija Jbala",   color:"#2050a8"},
          {id:"darija_cherg", label:"Darija Cherg",   color:"#4878d8"},
          {id:"hassania",     label:"Hassania",       color:"#1a2a60"}
      ]}
    ]
  },
  origin: {
    title: "Origine",
    groups: [{
      title: "Confédération",
      items: [
        {id:"masmuda",       label:"Masmuda",              color:"#c4622d"},
        {id:"sanhaja",       label:"Sanhaja",              color:"#2d6a9c"},
        {id:"zenata",        label:"Zenata",               color:"#4a8c6a"},
        {id:"mixed_amazigh", label:"Mixed Amazigh",        color:"#c4a02d"},
        {id:"mixed_arabo",   label:"Mixed Arabo-Amazigh",  color:"#9c7050"},
      ]
    },{
      title: "Sous-groupes",
      items: [
        {id:"awraba",  label:"Awraba",  color:"#e07840"},
        {id:"houara",  label:"Houara",  color:"#d4a830"},
        {id:"kutama",  label:"Kutama",  color:"#3d9cbd"},
        {id:"luwata",  label:"Luwata",  color:"#2d8c8c"},
        {id:"jazoula", label:"Jazoula", color:"#6a5dbc"},
        {id:"nefzawa", label:"Nefzawa", color:"#5aac3a"},
      ]
    }]
  },
  ethnicity: {
    title: "Ethnie",
    groups: [{
      title: "Ethnie / Région culturelle",
      items: [
        {id:"chleuh",            label:"Chleuh",              color:"#c4622d"},
        {id:"fezaz",             label:"Fezaz / Atlas",        color:"#2d6a9c"},
        {id:"riffi",             label:"Riffis",              color:"#3d8c5a"},
        {id:"sanhaja_srair",     label:"Sanhaja Srair",        color:"#1a7a5a"},
        {id:"ghomara_jbala",     label:"Ghomara / Jbala",     color:"#7a5a8c"},
        {id:"zenata_eth",        label:"Zenata",              color:"#2d7a5a"},
        {id:"arabise_tadla",     label:"Arabisé Tadla",       color:"#e8904a"},
        {id:"arabise_chaouia",   label:"Arabisé Chaouia",     color:"#c87040"},
        {id:"arabise_gherbawa",  label:"Arabisé Gherbawa",    color:"#a05030"},
        {id:"arabise_other",     label:"Arabisé Autres",      color:"#884020"},
        {id:"fes",               label:"Région de Fès",       color:"#9c8c2d"},
        {id:"sahrawi",           label:"Sahrawi",             color:"#b5956e"},
      ]
    }]
  },
  lifestyle: {
    title: "Lifestyle",
    groups: [{
      title: "Lifestyle",
      items: [
        {id:"sedentary",    label:"Sedentary",    color:"#4a8c2d"},
        {id:"semi_nomadic", label:"Semi-nomadic",  color:"#f0c800"},
        {id:"mixed_life",   label:"Mixed",         color:"#e07820"},
        {id:"nomadic",      label:"Nomadic",       color:"#cc2020"},
      ]
    }]
  }
};

// ── STATE ───────────────────────────────────────────────────
var geojson = null;
var layers = [];
var assignments = {};  // idx → {language, origin, sub_origin, ethnicity, lifestyle}
var undoStack = [];
var activeBrush = null;
var transitionBase = "darija";
var isPainting = false;
var currentView = "language";

var map = L.map("map",{center:[31,-6.5],zoom:6});
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {attribution:"&copy; OpenStreetMap &copy; CARTO",subdomains:"abcd",maxZoom:19}).addTo(map);

var tip = document.getElementById("tip");

// ── HELPERS ─────────────────────────────────────────────────
function viewField(view){
  // origin view paints sub_origin if it's a sub-group, else origin
  if(view==="origin"){
    if(activeBrush){
      var subIds=["awraba","houara","kutama","luwata","jazoula","nefzawa"];
      if(subIds.indexOf(activeBrush.id)>=0) return "sub_origin";
    }
    return "origin";
  }
  return view;  // language, ethnicity, lifestyle
}

function getColorForFeature(p){
  var pal = PALETTES[currentView];
  var field = currentView==="origin" ? "origin" : currentView;
  var subField = "sub_origin";
  var val = "";
  if(currentView==="origin"){
    val = p.sub_origin || p.origin || "";
  } else {
    val = p[field] || "";
  }
  // find color in palette
  for(var gi=0;gi<pal.groups.length;gi++){
    var g=pal.groups[gi];
    for(var ii=0;ii<g.items.length;ii++){
      if(g.items[ii].id===val) return g.items[ii].color;
    }
  }
  if(field==="language"&&(val==="mix_darija_tama"||val==="mix_tamazight")) return "#f5d200";
  return "#2a2520";
}

var TAMA_COLS={tachelhit:"#e8b800",tamazight:"#f5d200",tarifit:"#e09020",tasenhajit:"#c8d040",taghomarit:"#a8d040",amazigh:"#f0c800"};
var DARI_COLS={darija:"#3060c0",darija_jbala:"#2050a8",darija_cherg:"#4878d8",hassania:"#1a2a60"};

function sty(p){
  if(currentView==="language"){
    // Arabisation zone: language fill + dashed darija border
    if(p.arabisation && DARI_COLS[p.arabisation]){
      var langCol=TAMA_COLS[p.language||""]||"#f0c800";
      return {color:DARI_COLS[p.arabisation], fillColor:langCol, weight:3, opacity:1, fillOpacity:0.7, dashArray:"8 5"};
    }
    // Legacy mix_darija_tama: treat as tamazight + darija arabisation
    if(p.language==="mix_darija_tama"||p.language==="mix_tamazight"){
      return {color:"#3060c0", fillColor:"#f5d200", weight:2, opacity:.9, fillOpacity:.6, dashArray:"8 5"};
    }
  }
  // Mixed lifestyle: dashed orange (applies in any view for the colour, proper in lifestyle view)
  if(p.lifestyle==="mixed_life" && currentView==="lifestyle"){
    return {color:"#e07820", fillColor:"#e07820", weight:2, opacity:.9, fillOpacity:.45, dashArray:"5 4"};
  }
  var c=getColorForFeature(p);
  return {color:c, fillColor:c, weight:1, opacity:.82, fillOpacity:.55};
}

// ── LOAD GEOJSON ─────────────────────────────────────────────
function loadGeoJSON(data){
  geojson=data;
  layers.forEach(function(x){ map.removeLayer(x.ly); });
  layers=[]; assignments={}; undoStack=[];
  data.features.forEach(function(feat,idx){
    var p=feat.properties;
    assignments[idx]={
      language:    p.language||"",
      arabisation: p.arabisation||"",
      origin:      p.origin||"",
      sub_origin:  p.sub_origin||"",
      ethnicity:   p.ethnicity||"",
      lifestyle:   p.lifestyle||""
    };
    var ly=L.geoJSON(feat,{style:sty(p)});
    ly.on("mouseover",function(e){
      this.setStyle({fillOpacity:.82,weight:2}); this.bringToFront();
      var a=assignments[idx];
      var langColor="#888";
      if(a.language){
        var pal=PALETTES.language;
        if(a.language==="mix_darija_tama"||a.language==="mix_tamazight"){ langColor="#f5d200"; }
        else{ outer2: for(var gi=0;gi<pal.groups.length;gi++) for(var ii=0;ii<pal.groups[gi].items.length;ii++)
          if(pal.groups[gi].items[ii].id===a.language){ langColor=pal.groups[gi].items[ii].color; break outer2; }
        }
      }
      var langLabel=a.language||"—";
      var pal=PALETTES.language;
      outer: for(var gi=0;gi<pal.groups.length;gi++) for(var ii=0;ii<pal.groups[gi].items.length;ii++)
        if(pal.groups[gi].items[ii].id===a.language){ langLabel=pal.groups[gi].items[ii].label; break outer; }
      if(a.language==="mix_darija_tama") langLabel="Tamazight (transition)";
      tip.innerHTML="<b>"+(p.name||"—")+"</b><span class='tip-lang' style='color:"+langColor+"'>"+langLabel+"</span>";
      tip.style.display="block";
    });
    ly.on("mousemove",function(e){ tip.style.left=(e.originalEvent.clientX+14)+"px"; tip.style.top=(e.originalEvent.clientY-10)+"px"; });
    ly.on("mouseout",function(){ this.setStyle(sty(assignments[idx])); tip.style.display="none"; });
    ly.on("mousedown",function(e){ L.DomEvent.stopPropagation(e); isPainting=true; paint(idx); });
    ly.on("mousemove",function(e){ if(isPainting) paint(idx); });
    ly.on("mouseup",function(){ isPainting=false; });
    ly.addTo(map);
    layers.push({ly:ly,p:p,idx:idx});
  });
  document.addEventListener("mouseup",function(){ isPainting=false; });
  document.getElementById("empty-state").classList.add("gone");
  document.getElementById("tribe-count").textContent=data.features.length+" tribus";
  buildPalette(); updateProgress();
  try{ map.fitBounds(L.geoJSON(data).getBounds(),{padding:[20,20]}); }catch(e){}
}

// ── PAINT ────────────────────────────────────────────────────
function paint(idx){
  if(!activeBrush) return;
  var prev={};
  Object.assign(prev,assignments[idx]);
  var field=viewField(currentView);
  if(activeBrush.id==="__erase__"){
    assignments[idx][field]="";
  } else {
    // For origin view: if painting a sub-group, set sub_origin; if painting main, set origin and clear sub
    if(currentView==="origin"){
      var subIds=["awraba","houara","kutama","luwata","jazoula","nefzawa"];
      if(subIds.indexOf(activeBrush.id)>=0){
        assignments[idx].sub_origin=activeBrush.id;
      } else {
        assignments[idx].origin=activeBrush.id;
        assignments[idx].sub_origin="";
      }
    } else if(activeBrush.id==="__arb__"){
      assignments[idx].arabisation=transitionBase;
    } else if(activeBrush.id==="__arb_erase__"){
      assignments[idx].arabisation="";
    } else {
      assignments[idx][field]=activeBrush.id;
    }
  }
  // check changed
  var changed=JSON.stringify(prev)!==JSON.stringify(assignments[idx]);
  if(changed){
    undoStack.push({idx:idx,prev:prev});
    if(undoStack.length>300) undoStack.shift();
    // sync back to geojson
    Object.assign(geojson.features[idx].properties, assignments[idx]);
    layers[idx].ly.setStyle(sty(assignments[idx]));
    updateProgress();
  }
}

// ── UNDO ─────────────────────────────────────────────────────
function undo(){
  if(!undoStack.length) return;
  var op=undoStack.pop();
  assignments[op.idx]=op.prev;
  Object.assign(geojson.features[op.idx].properties, op.prev);
  layers[op.idx].ly.setStyle(sty(op.prev));
  updateProgress();
}
document.getElementById("undo-btn").addEventListener("click",undo);
document.addEventListener("keydown",function(e){ if((e.ctrlKey||e.metaKey)&&e.key==="z") undo(); });

// ── BRUSH ────────────────────────────────────────────────────
function selectBrush(item){
  activeBrush=item;
  buildPalette();
  document.getElementById("bi-dot").style.background=item.color;
  document.getElementById("bi-name").textContent=item.label;
}

// ── PALETTE ──────────────────────────────────────────────────
function buildPalette(){
  var pal=PALETTES[currentView];
  var html="";
  pal.groups.forEach(function(g){
    html+='<div class="pal-section"><div class="pal-title">'+g.title+'</div>';
    g.items.forEach(function(item){
      var active=activeBrush&&activeBrush.id===item.id;
      html+='<div class="swatch'+(active?" active":"")+'" data-id="'+item.id+'" data-color="'+item.color+'" data-label="'+item.label.replace(/"/g,"&quot;")+'">'+
        '<div class="sw-dot" style="background:'+item.color+'"></div>'+
        '<span class="sw-label">'+item.label+'</span>'+
        '</div>';
    });
    html+='</div>';
  });
  // Arabisation section (language view only)
  if(currentView==="language"){
    var tzActive=activeBrush&&activeBrush.id==="__arb__";
    var tzEraseActive=activeBrush&&activeBrush.id==="__arb_erase__";
    var dCol=DARI_COLS[transitionBase]||"#3060c0";
    var tCol=TAMA_COLS["tamazight"]||"#f5d200";
    html+='<div class="pal-section"><div class="pal-title" style="color:#e8c870">Arabisation</div>';
    html+='<div style="font-size:.61rem;color:var(--mt);margin:2px 4px 5px">Which Darija dialect is encroaching?</div>';
    html+='<select id="tz-base" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);color:#e0d4c0;padding:3px 6px;border-radius:2px;font-size:.68rem;margin-bottom:5px">';
    [{id:"darija",l:"Darija"},{id:"darija_jbala",l:"Jbala Darija"},{id:"darija_cherg",l:"Eastern Darija"},{id:"hassania",l:"Hassania"}].forEach(function(b){
      html+='<option value="'+b.id+'"'+(transitionBase===b.id?' selected':'')+'>'+b.l+'</option>';
    });
    html+='</select>';
    html+='<div class="swatch'+(tzActive?' active':'')+'" data-id="__arb__" data-color="'+dCol+'" data-label="Arabisation" style="align-items:center">';
    html+='<div class="sw-dot" style="background:'+tCol+';border:3px dashed '+dCol+'"></div>';
    html+='<span class="sw-label">Paint arabisation</span></div>';
    html+='<div class="swatch'+(tzEraseActive?' active':'')+'" data-id="__arb_erase__" data-color="#888" data-label="Erase arabisation">';
    html+='<div class="sw-dot" style="background:transparent;border:1px dashed rgba(200,150,50,.6)"></div>';
    html+='<span class="sw-label" style="color:rgba(200,150,50,.7)">Erase arabisation</span></div>';
    html+="</div>";
  }
  // Erase
  var eraseActive=activeBrush&&activeBrush.id==="__erase__";
  html+='<div class="pal-section"><div class="pal-divider" style="margin:0 0 5px"></div>'+
    '<div class="swatch erase'+(eraseActive?" active":"")+'" data-id="__erase__" data-color="#2a2520" data-label="Effacer">'+
    '<div class="sw-dot" style="background:transparent;border:1px dashed rgba(200,80,80,.6)"></div>'+
    '<span class="sw-label" style="color:rgba(200,100,100,.8)">Effacer</span>'+
    '</div></div>';
  document.getElementById("palette-scroll").innerHTML=html;
  document.querySelectorAll(".swatch").forEach(function(el){
    el.addEventListener("click",function(){
      selectBrush({id:this.dataset.id,color:this.dataset.color,label:this.dataset.label});
    });
  });
  var tzSel=document.getElementById("tz-base");
  if(tzSel){tzSel.addEventListener("change",function(){transitionBase=this.value;buildPalette();});}
}

// ── VIEW TABS ────────────────────────────────────────────────
document.querySelectorAll(".vtab").forEach(function(tab){
  tab.addEventListener("click",function(){
    currentView=this.dataset.view;
    activeBrush=null;
    document.querySelectorAll(".vtab").forEach(function(t){ t.classList.remove("active"); });
    this.classList.add("active");
    document.getElementById("bi-dot").style.background="#2a2520";
    document.getElementById("bi-name").textContent="Aucun sélectionné";
    buildPalette();
    layers.forEach(function(x){ x.ly.setStyle(sty(assignments[x.idx])); });
    updateProgress();
  });
});

// ── PROGRESS ─────────────────────────────────────────────────
function updateProgress(){
  if(!geojson) return;
  var total=geojson.features.length;
  var field=currentView==="origin"?"origin":currentView;
  var done=Object.values(assignments).filter(function(a){ return !!(a[field]); }).length;
  var pct=(done/total*100).toFixed(0);
  document.getElementById("prog-text").textContent=done+" / "+total+" assignés";
  document.getElementById("prog-fill").style.width=pct+"%";
  // color progress bar based on view
  var colors={language:"#e08c20",origin:"#c4622d",ethnicity:"#7a5a8c",lifestyle:"#4a8c2d"};
  document.getElementById("prog-fill").style.background=colors[currentView]||"#c9a84c";
}

// ── SEARCH ───────────────────────────────────────────────────
document.getElementById("searchbox").addEventListener("input",function(){
  var q=this.value.toLowerCase().trim();
  if(!layers.length) return;
  layers.forEach(function(x){
    var name=(x.p.name||"").toLowerCase();
    if(!q){ x.ly.setStyle(sty(assignments[x.idx])); return; }
    var hit=name.indexOf(q)>=0;
    var c=getColorForFeature(assignments[x.idx]);
    x.ly.setStyle({fillOpacity:hit?.9:.02,opacity:hit?1:.06,weight:hit?2.5:.3,fillColor:hit?c:"#111",color:hit?"#fff":"#222"});
    if(hit) x.ly.bringToFront();
  });
});

// ── IMPORT ───────────────────────────────────────────────────
function handleFile(file){
  if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try{ loadGeoJSON(JSON.parse(e.target.result)); }
    catch(err){ alert("GeoJSON invalide: "+err.message); }
  };
  r.readAsText(file);
}
document.getElementById("import-btn").addEventListener("click",function(){ document.getElementById("file-input").click(); });
document.getElementById("file-input").addEventListener("change",function(){ handleFile(this.files[0]); });
document.getElementById("drop-zone").addEventListener("click",function(){ document.getElementById("file-input").click(); });
document.body.addEventListener("dragover",function(e){ e.preventDefault(); document.body.classList.add("dragging-over"); });
document.body.addEventListener("dragleave",function(e){ if(!e.relatedTarget) document.body.classList.remove("dragging-over"); });
document.body.addEventListener("drop",function(e){ e.preventDefault(); document.body.classList.remove("dragging-over"); handleFile(e.dataTransfer.files[0]); });

// ── EXPORT ───────────────────────────────────────────────────
document.getElementById("export-btn").addEventListener("click",function(){
  if(!geojson){ alert("Importez d'abord un GeoJSON."); return; }
  var blob=new Blob([JSON.stringify(geojson,null,2)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tribus_maroc_langues.geojson"; a.click();
});

// ── INIT ─────────────────────────────────────────────────────
buildPalette();
</script>
</body>
</html>
